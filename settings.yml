show_hero:
  type: bool
  default: true

show_info_rail:
  type: bool
  default: true

rail_links:
  type: objects
  default: []
  schema:
    name: link
    properties:
      label:
        type: string
        required: true
        validations:
          max_length: 100
      url:
        type: string
        required: true
        validations:
          max_length: 500

hero_subtitle:
  type: string
  default: ""

show_topic_excerpts:
  type: bool
  default: true

accent_color:
  type: string
  default: ""

content_max_width:
  type: integer
  default: 1240
  min: 1040
  max: 1600

ui_radius:
  type: float
  default: 1.0
  min: 0.0
  max: 2.0
